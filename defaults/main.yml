---
# Project source code URL: https://codeberg.org/forgejo/forgejo

forgejo_enabled: true

forgejo_identifier: forgejo
forgejo_base_path: "/{{ forgejo_identifier }}"
forgejo_data_path: "{{ forgejo_base_path }}/data"

# renovate: datasource=docker depName=codeberg.org/forgejo/forgejo versioning=semver
forgejo_version: 15.0.0

forgejo_uid: ""
forgejo_gid: ""

# The scheme used for serving Forgejo.
forgejo_scheme: https

# The hostname at which Forgejo is served.
forgejo_hostname: ""

# The path at which Forgejo is served.
forgejo_path_prefix: /

forgejo_container_image: "{{ forgejo_container_image_registry_prefix }}forgejo/forgejo:{{ forgejo_container_image_tag }}"
forgejo_container_image_tag: "{{ forgejo_version }}-rootless"
forgejo_container_image_registry_prefix: "{{ forgejo_container_image_registry_prefix_upstream }}"
forgejo_container_image_registry_prefix_upstream: "{{ forgejo_container_image_registry_prefix_upstream_default }}"
forgejo_container_image_registry_prefix_upstream_default: codeberg.org/
forgejo_container_image_force_pull: "{{ forgejo_container_image.endswith(':latest') }}"

forgejo_container_image_self_build: false
forgejo_container_image_self_build_name: "forgejo/forgejo:{{ forgejo_container_image_self_build_repo_version }}"
forgejo_container_image_self_build_repo: "https://codeberg.org/forgejo/forgejo.git"
forgejo_container_image_self_build_repo_version: "{{ 'v' + forgejo_version if forgejo_version != 'latest' else 'forgejo' }}"
forgejo_container_image_self_build_src_files_path: "{{ forgejo_base_path }}/docker-src"
forgejo_container_image_self_build_environment_buildplatform: linux/amd64

# The base container network. It will be auto-created by this role if it doesn't exist already.
forgejo_container_network: "{{ forgejo_identifier }}"

# Control if the container network is deleted on uninstalling.
forgejo_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `forgejo_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
forgejo_container_http_host_bind_port: ""

# Specify how the metrics container publishes its HTTP port (as defined by `forgejo_container_metrics_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
forgejo_container_metrics_host_bind_port: ""

# Specify how the container publishes its SSH port (as defined by `forgejo_container_ssh_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
forgejo_container_ssh_host_bind_port: "{{ forgejo_container_ssh_port }}"

# The port number in the container
forgejo_container_http_port: 3000

# The port number of the metrics server in the container
forgejo_container_metrics_port: 3000

# The port number in the container
forgejo_container_ssh_port: 22

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
forgejo_container_additional_networks: "{{ forgejo_container_additional_networks_auto + forgejo_container_additional_networks_custom }}"
forgejo_container_additional_networks_auto: []
forgejo_container_additional_networks_custom: []

# forgejo_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `forgejo_container_labels_additional_labels_custom`.
forgejo_container_labels_traefik_enabled: true
forgejo_container_labels_traefik_docker_network: ""
forgejo_container_labels_traefik_hostname: "{{ forgejo_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/forgejo`).
forgejo_container_labels_traefik_path_prefix: "{{ forgejo_path_prefix }}"
forgejo_container_labels_traefik_rule: "Host(`{{ forgejo_container_labels_traefik_hostname }}`){% if forgejo_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ forgejo_container_labels_traefik_path_prefix | quote }}`){% endif %}"
forgejo_container_labels_traefik_priority: 0
forgejo_container_labels_traefik_entrypoints: web-secure
forgejo_container_labels_traefik_tls: "{{ forgejo_container_labels_traefik_entrypoints != 'web' }}"
forgejo_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls if labels are added to expose the Prometheus metrics publicly.
forgejo_container_labels_traefik_metrics_enabled: "{{ forgejo_config_metrics_enabled }}"
forgejo_container_labels_traefik_metrics_hostname: "{{ forgejo_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/metrics`).
forgejo_container_labels_traefik_metrics_path_prefix: /metrics
forgejo_container_labels_traefik_metrics_rule: "Host(`{{ forgejo_container_labels_traefik_metrics_hostname }}`){% if forgejo_container_labels_traefik_metrics_path_prefix != '/' %} && PathPrefix(`{{ forgejo_container_labels_traefik_metrics_path_prefix }}`){% endif %}"
forgejo_container_labels_traefik_metrics_priority: 0
forgejo_container_labels_traefik_metrics_entrypoints: "{{ forgejo_container_labels_traefik_entrypoints }}"
forgejo_container_labels_traefik_metrics_middlewares: []
forgejo_container_labels_traefik_metrics_tls: "{{ forgejo_container_labels_traefik_metrics_entrypoints != 'web' }}"
forgejo_container_labels_traefik_metrics_tls_certResolver: "{{ forgejo_container_labels_traefik_tls_certResolver }}"  # noqa var-naming
forgejo_container_labels_traefik_metrics_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
forgejo_container_labels_traefik_metrics_middleware_basic_auth_users: ""

# forgejo_container_labels_traefik_tcp_enabled controls whether labels to assist a Traefik reverse-proxy for SSH connections will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `forgejo_container_labels_additional_labels_custom`.
forgejo_container_labels_traefik_tcp_enabled: true
forgejo_container_labels_traefik_tcp_docker_network: "{{ forgejo_container_network }}"
forgejo_container_labels_traefik_tcp_rule: "HostSNI(`*`)"
forgejo_container_labels_traefik_tcp_priority: 0
forgejo_container_labels_traefik_tcp_entrypoints: ssh-forgejo

# Controls whether a compression middleware will be injected into the middlewares list.
# This compression middleware is supposed to be defined elsewhere (using labels or a File provider, etc.) and is merely referenced by this router.
forgejo_container_labels_traefik_compression_middleware_enabled: false
forgejo_container_labels_traefik_compression_middleware_name: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `forgejo_container_labels_traefik_additional_request_headers_custom`
forgejo_container_labels_traefik_additional_request_headers: "{{ forgejo_container_labels_traefik_additional_request_headers_auto | combine(forgejo_container_labels_traefik_additional_request_headers_custom) }}"
forgejo_container_labels_traefik_additional_request_headers_auto: |
  {{
    {}
    | combine ({'X-Script-Name': forgejo_path_prefix} if forgejo_path_prefix != '/' else {})
  }}
forgejo_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `forgejo_container_labels_traefik_additional_response_headers_custom`
forgejo_container_labels_traefik_additional_response_headers: "{{ forgejo_container_labels_traefik_additional_response_headers_auto | combine(forgejo_container_labels_traefik_additional_response_headers_custom) }}"
forgejo_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': forgejo_http_header_xss_protection} if forgejo_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': forgejo_http_header_content_type_options} if forgejo_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': forgejo_http_header_content_security_policy} if forgejo_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': forgejo_http_header_permissions_policy} if forgejo_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': forgejo_http_header_strict_transport_security} if forgejo_http_header_strict_transport_security and forgejo_container_labels_traefik_tls else {})
  }}
forgejo_container_labels_traefik_additional_response_headers_custom: {}

# forgejo_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `forgejo_container_labels_additional_labels_custom`
#
# Example:
# forgejo_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
forgejo_container_labels_additional_labels: "{{ forgejo_container_labels_additional_labels_auto + forgejo_container_labels_additional_labels_custom }}"
forgejo_container_labels_additional_labels_auto: []
forgejo_container_labels_additional_labels_custom: []

# Specify the size of the container's tmpfs volume
forgejo_container_tmpfs_tmp_size: 128m

# A list of extra arguments to pass to the container (`docker create` command)
forgejo_container_extra_arguments: "{{ forgejo_container_extra_arguments_auto + forgejo_container_extra_arguments_custom }}"
forgejo_container_extra_arguments_auto: []
forgejo_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
forgejo_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
forgejo_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
forgejo_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
forgejo_http_header_permissions_policy: "{{ 'interest-cohort=()' if forgejo_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
forgejo_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if forgejo_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `forgejo_http_header_permissions_policy`
forgejo_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `forgejo_http_header_strict_transport_security`
forgejo_hsts_preload_enabled: false

# List of systemd services that the Forgejo systemd service depends on
forgejo_systemd_required_services_list: "{{ forgejo_systemd_required_services_list_default + forgejo_systemd_required_services_list_auto + forgejo_systemd_required_services_list_custom }}"
forgejo_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
forgejo_systemd_required_services_list_auto: []
forgejo_systemd_required_services_list_custom: []

# List of systemd services that the Forgejo systemd service wants
forgejo_systemd_wanted_services_list: "{{ forgejo_systemd_wanted_services_list_default + forgejo_systemd_wanted_services_list_auto + forgejo_systemd_wanted_services_list_custom }}"
forgejo_systemd_wanted_services_list_default: []
forgejo_systemd_wanted_services_list_auto: []
forgejo_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
forgejo_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
forgejo_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
forgejo_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
forgejo_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ forgejo_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ forgejo_container_stop_grace_time_seconds }} {{ forgejo_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ forgejo_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ forgejo_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ forgejo_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ forgejo_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ forgejo_identifier }} after {{ forgejo_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

########################################################################
#                                                                      #
# cache                                                                #
#                                                                      #
########################################################################

# Specify cache adapter
# Valid values: memcache, memory, redis, redis-cluster, twoqueue
# See: https://forgejo.org/docs/latest/admin/config-cheat-sheet/#cache-cache
forgejo_config_cache_adapter: memory

# Control if the connection to Memcached is made via a Unix socket
forgejo_cache_memcache_socket_enabled: true

# Specify the path to the Memcached Unix socket path inside the Forgejo container
forgejo_cache_memcache_socket_path_container: /run-memcached

# Specify the path to the Memcached Unix socket path on the host (bind-mount source)
forgejo_cache_memcache_socket_path_host: ""

# Control if the connection to Redis is made via a Unix socket
forgejo_cache_redis_socket_enabled: true

# Specify the path to the Redis Unix socket path inside the Forgejo container
forgejo_cache_redis_socket_path_container: /run-valkey
forgejo_redis_socket_path: /valkey.sock

# Specify the path to the Redis Unix socket path on the host (bind-mount source)
forgejo_cache_redis_socket_path_host: ""

forgejo_config_cache_host: |
  {%- if forgejo_config_cache_adapter == 'redis' -%}

  {%- if forgejo_cache_redis_socket_enabled -%}
  redis+socket://{{ forgejo_cache_redis_socket_path_container + forgejo_redis_socket_path }}?db={{ forgejo_redis_database }}?pool_size=100&idle_timeout=180s
  {%- else -%}
  redis://{{ forgejo_redis_username }}:{{ forgejo_redis_password }}@{{ forgejo_redis_hostname }}:{{ forgejo_redis_port }}/{{ forgejo_redis_database }}?pool_size=100&idle_timeout=180s
  {%- endif -%}

  {%- elif forgejo_config_cache_adapter == 'redis-cluster' -%}
  redis+cluster://{{ forgejo_redis_username }}:{{ forgejo_redis_password }}@{{ forgejo_redis_hostname }}:{{ forgejo_redis_port }}/{{ forgejo_redis_database }}?pool_size=100&idle_timeout=180s

  {%- elif forgejo_config_cache_adapter == 'memcached' -%}
  {{ forgejo_cache_memcache_socket_path_container + '/memcached.sock' if forgejo_cache_memcache_socket_enabled else '' }}"

  {%- endif -%}

########################################################################
#                                                                      #
# /cache                                                               #
#                                                                      #
########################################################################

########################################################################
#                                                                      #
# database                                                             #
#                                                                      #
########################################################################

# Specify a database driver to use
# Valid values: mysql, postgres, sqlite
forgejo_database_type: sqlite

# Specify database configuration
forgejo_database_mysql_hostname: ""
forgejo_database_mysql_port: 3306
forgejo_database_mysql_username: forgejo
forgejo_database_mysql_password: ""
forgejo_database_postgres_hostname: ""
forgejo_database_postgres_port: 5432
forgejo_database_postgres_username: forgejo
forgejo_database_postgres_password: ""
# Specify SSL mode for MySQL database server
# By default, we expect a local container (without SSL), so attempting SSL connections is not necessary.
# Valid values: see https://forgejo.org/docs/latest/admin/config-cheat-sheet/#database-database
forgejo_database_mysql_sslmode: disable
# Specify SSL mode for Postgres database server
# By default, we expect a local container (without SSL), so attempting SSL connections is not necessary.
# Valid values: see https://forgejo.org/docs/latest/admin/config-cheat-sheet/#database-database
forgejo_database_postgres_sslmode: disable
forgejo_database_name: forgejo

# Control if the database connection to MySQL is made via a Unix socket
forgejo_database_mysql_socket_enabled: true

# Specify the path to the MySQL Unix socket path inside the Forgejo container
forgejo_database_mysql_socket_path_container: /run-mysqld

# Specify the path to the MySQL Unix socket path on the host (bind-mount source)
forgejo_database_mysql_socket_path_host: ""

# Control if the database connection to Postgres is made via a Unix socket
forgejo_database_postgres_socket_enabled: true

# Specify the path to the Postgres Unix socket path inside the Forgejo container
forgejo_database_postgres_socket_path_container: /run-postgres

# Specify the path to the Postgres Unix socket path on the host (bind-mount source)
forgejo_database_postgres_socket_path_host: ""

# Specify database host address and port or absolute path for Unix socket
forgejo_config_database_host_mysql: "{{ forgejo_database_mysql_socket_path_container + '/mysqld.sock' if forgejo_database_mysql_socket_enabled else forgejo_database_mysql_hostname + ':' + forgejo_database_mysql_port | string }}"
forgejo_config_database_host_postgres: "{{ forgejo_database_postgres_socket_path_container if forgejo_database_postgres_socket_enabled else forgejo_database_postgres_hostname + ':' + forgejo_database_postgres_port | string }}"

########################################################################
#                                                                      #
# /database                                                            #
#                                                                      #
########################################################################

########################################################################
#                                                                      #
# session                                                              #
#                                                                      #
########################################################################

# Specify cache adapter
# Valid values: memory, file, redis, db, mysql, couchbase, memcache, postgres
# See: https://forgejo.org/docs/latest/admin/config-cheat-sheet/#session-session
forgejo_config_session_provider: "{{ 'db' if forgejo_database_type != '' else 'memory' }}"

########################################################################
#                                                                      #
# /session                                                             #
#                                                                      #
########################################################################

forgejo_redis_hostname: ""
forgejo_redis_port: 6379
forgejo_redis_username: ""
forgejo_redis_password: ""
forgejo_redis_database: 0

# Specify issue indexer type
# Valid values: bleve, db, elasticsearch, meilisearch
forgejo_environment_variables_indexer_issue_indexer_type: bleve

# Specify issue indexer connection string
# Available when forgejo_environment_variables_indexer_issue_indexer_type is `elasticsearch` or `meilisearch`
forgejo_environment_variables_indexer_issue_indexer_conn_str: ""

# Enable this to send e-mail to watchers of a repository when something happens, like creating issues. Requires Mailer to be enabled.
# See: https://forgejo.org/docs/latest/admin/config-cheat-sheet/#service-service
#
# We enable this by default if the mailer is enabled, because it makes sense to have it used for more than just transactional emails.
forgejo_config_service_enable_notify_email: "{{ forgejo_config_mailer_enabled }}"

forgejo_config_mailer_enabled: false
forgejo_config_mailer_from: ""
forgejo_config_mailer_protocol: ""
forgejo_config_mailer_smtp_addr: ""
forgejo_config_mailer_smtp_port: 587
forgejo_config_mailer_user: ""
forgejo_config_mailer_passwd: ""

# Control if the /metrics endpoint for Prometheus is enabled
forgejo_config_metrics_enabled: false

forgejo_config_root_url: "{{ forgejo_scheme }}://{{ forgejo_hostname }}{{ forgejo_path_prefix }}"

# Controls the `FORGEJO__server__SSH_LISTEN_PORT` environment variable.
forgejo_config_server_ssh_listen_port: 4382 # Random number to avoid collision

# Control if minimum key size with corresponding type is checked
forgejo_config_server_minimum_key_size_check: true

# Controls the RUN_USER configuration setting (`FORGEJO____RUN_USER=` environment variable).
#
# This defaults to `git` in the upstream configuration.
#
# On startup, Forgejo checks if the resolved username for the user it works with matches the RUN_USER.
#
# Because we run the container with a custom user (forgejo_uid),
# and not with uid=1000 matching the git user and inside the container,
# unless we unset this, we'd get an error message:
# > `Expect user 'git' but current user is: `
#
# Unsetting this to an empty string makes it match. Unless you forgejo_uid accidentally hits some other user that is part of the container's /etc/passwd file.
forgejo_config_run_user: "{{ 'git' if forgejo_uid | string == '1000' else '' }}"

# Controls the `FORGEJO__service__DISABLE_REGISTRATION` environment variable.
# Disables registration, after which only admins can create accounts for users.
forgejo_config_service_disable_registration: true

# Controls the `FORGEJO__service__REGISTER_EMAIL_CONFIRM` environment variable.
# Enable this to ask for mail confirmation of registration. Requires Mailer to be enabled.
forgejo_config_service_register_email_confirm: false

# Controls the `FORGEJO__service__REGISTER_MANUAL_CONFIRM` environment variable.
# Enable this to manually confirm new registrations. Requires REGISTER_EMAIL_CONFIRM to be disabled.
forgejo_config_service_register_manual_confirm: false

# Controls the `FORGEJO__service__ENABLE_OPENID_SIGNIN` environment variable.
# Enables OpenID sign-in.
# See: https://forgejo.org/docs/latest/admin/config-cheat-sheet/#openid-openid
forgejo_config_service_enable_openid_signin: true

# Controls the `FORGEJO__service__ENABLE_OPENID_SIGNUP` environment variable.
# Enables OpenID sign-up.
# See: https://forgejo.org/docs/latest/admin/config-cheat-sheet/#openid-openid
forgejo_config_service_enable_openid_signup: "{{ not forgejo_config_service_disable_registration }}"

# Controls the `FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION` environment variable.
# Enables automatic user accounts creation for new OAuth2 users.
# See: https://forgejo.org/docs/latest/admin/config-cheat-sheet/#oauth2-client-oauth2_client
forgejo_config_oauth2_client_enable_auto_registration: false

# When integrating Forgejo with Woodpecker CI, and if Woodpecker is
# served under a subpath (e.g. `https://forgejo.host/ci`), it is
# necessary to use Docker's `--add-host` option to point Forgejo to
# the external host IP, so that webhook calls to Woodpecker can work.
#
# For example:
#
#  forgejo_container_add_host_domain_name: "{{ devture_woodpecker_ci_server_hostname }}"
#  forgejo_container_add_host_domain_ip_address: "{{ ansible_host }}"
#
# Don't forget to also update `webhook.ALLOWED_HOST_LIST` on Forgejo's
# app.ini config file.
forgejo_container_add_host_domain_name: ""
forgejo_container_add_host_domain_ip_address: ""

# OAuth2 configuration (with OpenID Connect). See https://forgejo.org/docs/latest/admin/command-line/#admin-auth-add-oauth for details
forgejo_oidc_client_enabled: false

# Public API surface for playbooks/roles. These are intended for external
# consumers and are currently not consumed by this role's task logic.
forgejo_oidc_client_name: "{{ forgejo_identifier }}"
forgejo_oidc_redirect_uris: "https://{{ forgejo_hostname }}/user/oauth2/{{ forgejo_oidc_provider_name | urlencode }}/callback"

forgejo_oidc_provider_name: ""
forgejo_oidc_client_id: ""
forgejo_oidc_client_secret: ""
forgejo_oidc_auto_discover_url: ""

# Public API surface for playbooks/roles (reserved for external/manual OIDC
# integration workflows). Not currently consumed by this role's task logic.
forgejo_oidc_authorize_url: ""
forgejo_oidc_token_url: ""
forgejo_oidc_userinfo_url: ""
forgejo_oidc_icon_url: ""
forgejo_oidc_scopes: "openid email profile"

forgejo_oidc_required_claim_name: ""
forgejo_oidc_required_claim_value: ""
forgejo_oidc_group_claim_name: "groups"
forgejo_oidc_admin_group: "admin"
forgejo_oidc_restricted_group: ""
forgejo_oidc_group_team_map: ""
forgejo_oidc_group_team_map_removal: false
forgejo_oidc_allow_username_change: false
forgejo_oidc_skip_local_2fa: false

# Specify the timezone
forgejo_environment_variables_tz: UTC

# forgejo_environment_variables_additional_variables contains a multiline string with additional environment variables to pass to the container.
#
# Example:
# forgejo_environment_variables_additional_variables: |
#   VAR=1
#   ANOTHER=value
forgejo_environment_variables_additional_variables: ""

# forgejo_restart_necessary controls whether the Forgejo systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
forgejo_restart_necessary: false
